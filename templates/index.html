<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Luyện Tập AI - THPT Việt Đức</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Thêm một chút CSS bổ trợ dựa trên phong cách của bạn */
        .portal-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 100px); /* Trừ đi khoảng cách footer */
            padding: 20px;
        }
        .portal-grid {
            display: flex;
            gap: 25px;
            width: 100%;
            max-width: 850px;
        }
        .choice-card {
            flex: 1;
            text-align: center;
            padding: 40px 20px;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }
        .choice-card:hover {
            border-color: #ff7a18; /* Màu cam thương hiệu của Đạt */
            transform: translateY(-10px);
        }
        .choice-card i {
            font-size: 4rem;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Modal đăng nhập admin dựa trên màu sắc của bạn */
        #login-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 320px;
            text-align: center;
            border-top: 5px solid #6f42c1; /* Màu tím bạn dùng cho nút chat */
        }
        .modal-content input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="top-corner-logo">
        <img src="{{ url_for('static', filename='410248302_265238099893030_4556676985882445566_n.jpg') }}" alt="Logo">
    </div>

    <div class="portal-wrapper">
        <div class="portal-grid">
            
            <div class="container choice-card" onclick="location.href='/student_hub'">
                <i class="fas fa-user-graduate"></i>
                <h2 style="color: #2d3436;">HỌC SINH</h2>
                <p style="color: #636e72;">Vào luyện đề thi THPT Quốc gia với trợ lý Cheems</p>
                <button>BẮT ĐẦU NGAY</button>
            </div>

            <div class="container choice-card" onclick="showLogin()">
                <i class="fas fa-user-tie"></i>
                <h2 style="color: #2d3436;">GIÁO VIÊN</h2>
                <p style="color: #636e72;">Tạo mã đề mới và theo dõi kết quả của học sinh</p>
                <button class="btn-chat-free">QUẢN TRỊ VIÊN</button>
            </div>

        </div>
    </div>

    <div id="login-modal">
        <div class="modal-content container">
            <h3 style="margin-top:0;">Đăng nhập Admin</h3>
            <input type="text" id="username" placeholder="Tên đăng nhập...">
            <input type="password" id="password" placeholder="Mật khẩu...">
            <button onclick="login()" style="width: 100%;">XÁC NHẬN</button>
            <button onclick="hideLogin()" style="background: #dfe6e9; color: #333; width: 100%;">HỦY</button>
        </div>
    </div>

    <footer class="site-footer">
        <p><strong>Hệ thống luyện thi AI - THPT Việt Đức</strong></p>
        <p>code by: Hoàng Gia Đạt &copy; 2026</p>
        <p>co-founder: Hoàng Thị Khánh Vân<p>
    </footer>

    <script>
        function showLogin() { document.getElementById('login-modal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('login-modal').style.display = 'none'; }

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            const response = await fetch('/api/teacher-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });

            if (response.ok) {
                window.location.href = '/teacher_dashboard';
            } else {
                alert('Sai tài khoản hoặc mật khẩu rồi!');
            }
        }
    </script>
</body>
</html>
